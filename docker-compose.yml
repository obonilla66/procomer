
services:
  catalog-api:
    build:
      context: .
      dockerfile: src/Catalog/Catalog.Api/Dockerfile
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=InvestorSchedulingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
    depends_on:
      - sqlserver

  agenda-api:
    build:
      context: .
      dockerfile: src/Agenda/Agenda.Api/Dockerfile
    ports:
      - "8082:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AgendaDb: "Server=sqlserver;Database=InvestorSchedulingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      Services__CatalogApi: "http://catalog-api:8080"
      Services__PdfApi: "http://pdf-api:8080"
    depends_on:
      - sqlserver
      - catalog-api
      - pdf-api

  pdf-api:
    build:
      context: .
      dockerfile: src/PDF/PDF.Api/Dockerfile
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PdfDb: "Server=sqlserver;Database=InvestorSchedulingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      ConnectionStrings__AgendaDb: "Server=sqlserver;Database=InvestorSchedulingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=InvestorSchedulingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
    depends_on:
      - sqlserver

  frontend:
    build:
      context: .
      dockerfile: src/Web/InvestorScheduling.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Services__CatalogApi: "http://catalog-api:8080"
      Services__AgendaApi: "http://agenda-api:8080"
      Services__PdfApi: "http://pdf-api:8080"
    depends_on:
      - catalog-api
      - agenda-api
      - pdf-api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
